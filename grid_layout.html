<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Grid Layout</title>
    <link rel="stylesheet" href="grid.css">
</head>

<body>

    <div class="layout-container">

        <header class="header">
            <h2>HEADER (full width)</h2>
        </header>

        <section class="hero">
            <div class="hero-featured-card">
                <h3>Sản phẩm nổi bật (Featured)</h3>
                <p>Nội dung giới hạn trong 2 cột của Hero Banner.</p>
            </div>
            <div class="hero-normal-card">
                <h3>Card phụ</h3>
            </div>
        </section>

        <aside class="sidebar">
            <h3>Bộ lọc (Filter)</h3>
            <div class="filter-group">
                <label><input type="checkbox"> Apple</label><br>
                <label><input type="checkbox"> Samsung</label><br>
                <label><input type="checkbox"> Xiaomi</label><br>
                <label><input type="checkbox"> Oppo</label><br>
            </div>
        </aside>

        <main class="main-content">
            <div class="product-card">Card 1</div>
            <div class="product-card">Card 2</div>
            <div class="product-card">Card 3</div>
            <div class="product-card">Card 4</div>
            <div class="product-card">Card 5</div>
            <div class="product-card">Card 6</div>
            <div class="product-card">Card 7</div>
            <div class="product-card">Card 8</div>
            <div class="product-card">Card 9</div>
        </main>

        <aside class="ads">
            <h3>ADS</h3>
            <img src="https://via.placeholder.com/160x400?text=Banner+Quang+Cao" alt="Ads Banner" class="ads-image">
        </aside>

        <footer class="footer">
            <p>FOOTER (full width)</p>
        </footer>

    </div>

</body>

</html>
